<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
</head>
<body>
  <header class="header">
    <div class="icon">
      <img src="../images/icon.svg" alt="icon image check">
    </div>
    <div class="titleBox">
      <div class="title">Todo List</div>
    </div>
  </header>
  <aside class="sideBar">
    <div class="createButtonContainer">
      <button class="createButton" type="button">Create Project</button>
    </div>
    <div class="projectsContainer">Projects:
    </div>
  </aside>
  <dialog class="modalContainer">
    <form action="" method="">
      <div class="modalText">Create new project</div>
      <div class="inputModal">
        <input type="text" id="inputSpace" name="project_name">
      </div>
      <div class="modalControls">
        <button type="submit" class="submitModal">Submit</button>
        <button type="submit" class="cancelModal">Cancel</button>
      </div>
    </form>
  </dialog>
</body>
</html>
